<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Disqus Boards</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #333;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 40px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #17ADFF;
      letter-spacing: -0.5px;
    }
    .logo span { color: #333; }
    main {
      max-width: 860px;
      margin: 40px auto;
      padding: 0 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #17ADFF;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }
    #disqus-boards-host {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      min-height: 400px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">DISQUS <span>Boards</span></div>
</header>

<main>
  <h1>Community Forum</h1>
  <p class="subtitle">Powered by Disqus Boards</p>
  <div id="disqus-boards-host"></div>
</main>

<script>
  window.disqus_boards_config = function () {
    this.routerMode = 'history';
    this.basePath = '/disqus-boards-test/boards';
  }
</script>
<script>
  (function() {
    if (document.getElementById('disqus_boards_script')) return;
    var d = document, s = d.createElement('script');
    s.id = 'disqus_boards_script';
    s.src = 'https://boards-ntiglias.disqus.com/boards.js';
    (d.head || d.body).appendChild(s);
  })();
</script>

</body>
</html>
